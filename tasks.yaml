# glyphit3d task registry (jahns-workflow). Read/mutate via `jw task`, NOT by editing
# this file whole (a PreToolUse hook redirects raw reads). IDs are <type>/<kebab-slug>,
# type ∈ feat|fix|perf|gate|spike|decision|docs|chore. Bare codenames (P0, Q1, …) banned.
#
# Required per task: id, title, status (pending|active|done|blocked|dropped).
# Optional fields:
#   deps: [ids]          unmet deps → status blocked (list them)
#   milestone: M4        organizing bucket (defined under milestones:)
#   round: 2026-07-07-x  the round that touched it
#   anchor: "DESIGN §6"  the SSOT section this task governs (§-anchor, never a line no.)
#   severity: blocker|major|minor   (review findings)
#   origin: "..."        where it came from (review, feedback, spec)
#   branch: feat/...     working branch
#   notes: "..."         free text; old codenames go here for traceability (e.g. "was P0")
#   ruling: "..."        the user's decision on a decision/... task
#   result: "..."        a recorded measurement/outcome
#   lane: {branch, base_sha, depends_on}   parallel worktree lane
